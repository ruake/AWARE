kind = "web"
previewPath = "/"
title = "A.W.A.R.E. Dashboard"
version = "1.0.0"
id = "artifacts/aware"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25485

[services.development]
run = "pnpm --filter @workspace/aware run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aware", "run", "build" ]
publicDir = "artifacts/aware/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25485"
BASE_PATH = "/"
