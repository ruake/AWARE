name: Run Tests

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: [main]
    paths:
      - "artifacts/aware-app/src/**"
      - "artifacts/aware-app/e2e/**"
      - "artifacts/aware-app/src/data/**"
  pull_request:
    branches: [main]
    paths:
      - "artifacts/aware-app/src/**"
      - "artifacts/aware-app/e2e/**"
      - "artifacts/aware-app/src/data/**"
  workflow_dispatch:
    inputs:
      branch:
        description: Branch or commit SHA to run against
        required: true
        default: main
      suite:
        description: Test suite to execute
        required: true
        type: choice
        options:
          - suite_full
          - suite_geo
          - suite_perf
          - suite_security
          - suite_smoke
          - suite_uat
          - suite_edge
          - suite_mobile
      target:
        description: Target environment
        required: true
        type: choice
        options:
          - Prod
          - UAT
      environment:
        description: Environment tier
        required: true
        type: choice
        options:
          - Production
          - Staging
      parallelism:
        description: Max parallel jobs
        required: false
        type: number
        default: 4
      retries:
        description: Failure retry count
        required: false
        type: number
        default: 1

jobs:
  # ── On push/PR: typecheck + unit tests + E2E smoke ──
  verify:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/aware-app
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: TypeScript check
        run: pnpm run typecheck
      - name: Run unit tests
        run: pnpm test || echo "No unit tests"
      - name: Install Playwright browsers
        run: pnpm run test:e2e:install
      - name: Run E2E smoke tests
        run: pnpm run test:e2e:ci

  # ── On manual dispatch: resolve + execute suite ──
  resolve-tests:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      test-matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
      - id: resolve
        run: |
          echo "matrix={\"target\":[\"${{ github.event.inputs.target }}\"],\"environment\":[\"${{ github.event.inputs.environment }}\"]}" >> $GITHUB_OUTPUT

  run-tests:
    if: github.event_name == 'workflow_dispatch'
    needs: resolve-tests
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.resolve-tests.outputs.test-matrix) }}
      max-parallel: 4
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm run test:e2e:install
        continue-on-error: true

      - name: Run ${{ github.event.inputs.suite }} on ${{ matrix.target }}/${{ matrix.environment }}
        run: |
          pnpm run test -- \
            --suite "${{ github.event.inputs.suite }}" \
            --target "${{ matrix.target }}" \
            --environment "${{ matrix.environment }}" \
            --retries "${{ github.event.inputs.retries }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}-${{ matrix.target }}-${{ matrix.environment }}
          path: artifacts/aware-app/test-results/
          retention-days: 14
