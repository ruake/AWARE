name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck:libs
      - run: pnpm --filter @workspace/api-server run typecheck
      - run: pnpm --filter @workspace/aware run typecheck
      - run: pnpm --filter @workspace/mockup-sandbox run typecheck
      - run: pnpm --filter @workspace/scripts run typecheck
