name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  # ── Step 0: Validate config before doing anything ──────────────────────────
  validate-config:
    name: Validate AWARE config
    uses: ./.github/workflows/validate-config.yml

  ci:
    needs: [validate-config]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/aware-app
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Validate data contracts
        run: pnpm run validate:data
      - name: Lint
        run: pnpm run lint
      - name: Format check
        run: pnpm run format
      - name: TypeScript check
        run: pnpm run typecheck
      - name: Run unit tests
        run: pnpm test || echo "No unit tests"
      - name: Production audit
        run: pnpm run audit

  e2e:
    needs: [validate-config]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/aware-app
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm run test:e2e:install
      - name: Run E2E tests (Playwright)
        run: pnpm run test:e2e:ci
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:5173"

      - name: Run Puppeteer tests
        run: node scripts/run-puppeteer.mjs
        continue-on-error: true
        env:
          BASE_URL: "https://www.akamai.com"

      - name: Run HTTP tests
        run: node scripts/run-http.mjs
        continue-on-error: true
        env:
          BASE_URL: "https://www.akamai.com"

      - name: Upload E2E results and screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: artifacts/aware-app/test-results/
          retention-days: 1
          if-no-files-found: warn

  build-and-deploy:
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/aware-app

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Download E2E results
        uses: actions/download-artifact@v8
        with:
          name: e2e-results
          path: artifacts/aware-app/test-results/
        continue-on-error: true

      - name: Record run from Playwright results
        run: node scripts/record-run.mjs test-results/playwright-results.json --label "(Playwright)" --suffix pw
        continue-on-error: true

      - name: Record run from Puppeteer results
        run: node scripts/record-run.mjs test-results/puppeteer-results.json --label "(Puppeteer)" --suffix pu
        continue-on-error: true

      - name: Record run from HTTP results
        run: node scripts/record-run.mjs test-results/http-results.json --label "(HTTP)" --suffix ht
        continue-on-error: true

      - name: Run test discovery
        run: pnpm discover:tests
        env:
          TZ: UTC

      - name: Generate test manifest from discovered tests
        run: |
          echo "Generating test manifest..."
          mkdir -p dist/public
          node -e "
            const fs = require('fs');
            const tests = JSON.parse(fs.readFileSync('data/auto-tests.json','utf8'));
            const manifest = {
              generated: new Date().toISOString(),
              totalTests: tests.length,
              suites: [...new Set(tests.flatMap(t => t.suiteIds || []))],
              categories: [...new Set(tests.map(t => t.category))],
              automated: tests.filter(t => t.automated).length,
              manual: tests.filter(t => !t.automated).length,
            };
            fs.writeFileSync('public/test-manifest.json', JSON.stringify(manifest, null, 2));
            console.log('Manifest:', JSON.stringify(manifest, null, 2));
          "

      - name: Build (production)
        run: pnpm build
        env:
          BASE_PATH: /aware
          PORT: "1"
          NODE_ENV: production

      - name: SPA fallback — copy index.html as 404.html
        run: cp dist/public/index.html dist/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: artifacts/aware-app/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Upload updated data for data branch sync
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: updated-data
          path: artifacts/aware-app/data/
          retention-days: 1
          if-no-files-found: warn

  # ── Initialize data branch on first deploy ─────────────────────────────────
  init-data-branch:
    needs: [build-and-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install scripts dependencies
        run: pnpm --filter @workspace/scripts install --frozen-lockfile

      - name: Initialize data branch (if needed)
        run: node scripts/init-data-branch.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-data:
    needs: [build-and-deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download updated data
        uses: actions/download-artifact@v8
        with:
          name: updated-data
          path: data/
        continue-on-error: true
      - name: Commit run data to data branch
        run: |
          BRANCH="data"
          git config user.name "AWARE Bot"
          git config user.email "bot@aware.dev"
          git fetch origin "+${BRANCH}:refs/remotes/origin/${BRANCH}" 2>/dev/null || true
          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            git checkout -b "${BRANCH}" "origin/${BRANCH}" 2>/dev/null || git checkout "${BRANCH}"
          else
            echo "Data branch does not exist yet — skipping sync (init-data-branch will create it)"
            exit 0
          fi
          cp "${GITHUB_WORKSPACE}/data/"*.json . 2>/dev/null || true
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to run data"
          else
            git commit -m "record CI run [skip ci]"
            git push --force origin "${BRANCH}"
          fi
          git checkout -f main 2>/dev/null || true
