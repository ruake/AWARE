name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/aware-app
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Validate data contracts
        run: pnpm run validate:data
      - name: TypeScript check
        run: pnpm run typecheck
      - name: Run unit tests
        run: pnpm test || echo "No unit tests"

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/aware-app
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Install Playwright browsers
        run: pnpm run test:e2e:install
      - name: Run E2E tests
        run: pnpm run test:e2e:ci
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:5173"

      - name: Upload Playwright results and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: artifacts/aware-app/test-results/
          retention-days: 1
          if-no-files-found: warn

  build-and-deploy:
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/aware-app

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Download Playwright results
        uses: actions/download-artifact@v4
        with:
          name: playwright-results
          path: artifacts/aware-app/test-results/

      - name: Record run from E2E results
        run: node scripts/record-run.mjs test-results/playwright-results.json
        continue-on-error: true

      - name: Run test discovery
        run: pnpm discover:tests
        env:
          TZ: UTC

      - name: Generate test manifest from discovered tests
        run: |
          echo "Generating test manifest..."
          mkdir -p dist/public
          node -e "
            const fs = require('fs');
            const tests = JSON.parse(fs.readFileSync('src/data/auto-tests.json','utf8'));
            const manifest = {
              generated: new Date().toISOString(),
              totalTests: tests.length,
              suites: [...new Set(tests.flatMap(t => t.suiteIds || []))],
              categories: [...new Set(tests.map(t => t.category))],
              automated: tests.filter(t => t.automated).length,
              manual: tests.filter(t => !t.automated).length,
            };
            fs.writeFileSync('public/test-manifest.json', JSON.stringify(manifest, null, 2));
            console.log('Manifest:', JSON.stringify(manifest, null, 2));
          "

      - name: Build (production — non-mock)
        run: pnpm build
        env:
          BASE_PATH: /AWARE
          PORT: "1"
          NODE_ENV: production

      - name: SPA fallback — copy index.html as 404.html
        run: cp dist/public/index.html dist/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: artifacts/aware-app/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Commit run data back to repo
        if: always()
        run: |
          git config user.name "AWARE Bot"
          git config user.email "bot@aware.dev"
          git add src/data/runs.json src/data/test-results.json src/data/screenshots/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to run data"
          else
            git commit -m "record CI run [skip ci]"
            git push
          fi
