name: Test Deploy
on:
  push:
    branches: [test-actions]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: test-pages
  cancel-in-progress: true
env:
  NODE_OPTIONS: --max-old-space-size=4096
jobs:
  validate-config:
    name: Validate AWARE config
    uses: ./.github/workflows/validate-config.yml
  test-job:
    needs: [validate-config]
    runs-on: ubuntu-latest
    steps:
      - run: echo "OK"
