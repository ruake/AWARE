# =============================================================================
# Playwright Job — Job Template (Kubernetes pattern)
#
# A pure, reusable Playwright execution template. Knows nothing about
# scheduling — that's the controller's job. Knows only how to:
#   1. Check out the tests branch (specs + config live there)
#   2. Run Playwright shards in parallel
#   3. Merge shard results
#   4. Hand lifecycle + data writes to the operator and data-writer
#
# K8s analogy: a Job manifest stamped out by the controller.
# Each invocation gets its own labeled run-id.
#
# Triggered by: controller.yml (via gh workflow run) or manual dispatch
# =============================================================================
name: "Job: Playwright"

on:
  workflow_dispatch:
    inputs:
      suite_id:
        description: "Suite ID from config/test-suites.yml"
        required: true
        default: "suite_smoke"
      env_label:
        description: "Environment label (e.g. 'QA / Staging')"
        required: true
        default: "QA / Staging"
      tier:
        description: "Tier: QA | UAT | PROD"
        required: true
        default: "QA"
      network:
        description: "Akamai network: staging | production"
        required: true
        default: "staging"
      base_url:
        description: "Target base URL"
        required: true
        default: "https://www.akamai.com"
      total_shards:
        description: "Number of parallel shards (1–8)"
        required: false
        default: "4"
      tests_ref:
        description: "tests branch ref"
        required: false
        default: "tests"

concurrency:
  group: "playwright-${{ inputs.suite_id }}-${{ inputs.env_label }}"
  cancel-in-progress: false

permissions:
  contents: write
  statuses: write
  actions: read

env:
  WORKING_DIR: artifacts/aware-app

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Shards run in parallel (K8s: parallel pod replicas)
  # ─────────────────────────────────────────────────────────────────────────
  shard:
    name: "Shard ${{ matrix.shard }}/${{ inputs.total_shards }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(inputs.total_shards == '1' && '[1]' || inputs.total_shards == '2' && '[1,2]' || inputs.total_shards == '3' && '[1,2,3]' || '[1,2,3,4]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node
        with:
          working-dir: ${{ env.WORKING_DIR }}

      - name: Run Playwright shard
        id: runner
        uses: ./.github/actions/test-runner
        with:
          runner-type: playwright
          suite-id: ${{ inputs.suite_id }}
          env-label: ${{ inputs.env_label }}
          base-url: ${{ inputs.base_url }}
          network: ${{ inputs.network }}
          tier: ${{ inputs.tier }}
          shard: ${{ matrix.shard }}
          total-shards: ${{ inputs.total_shards }}
          working-dir: ${{ env.WORKING_DIR }}
          tests-ref: ${{ inputs.tests_ref }}

      # Persist shard result for the merge job
      - name: Save shard result
        uses: actions/upload-artifact@v4
        with:
          name: "shard-result-${{ matrix.shard }}"
          path: "${{ env.WORKING_DIR }}/test-results/"
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Merge: collect shards, compute totals, hand off to operator + data-writer
  # K8s analogy: the Job completion handler
  # ─────────────────────────────────────────────────────────────────────────
  merge-and-record:
    name: "Merge → Operator → Data Writer"
    runs-on: ubuntu-latest
    needs: shard
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node
        with:
          working-dir: ${{ env.WORKING_DIR }}

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "shard-result-*"
          path: merged-results/

      - name: Merge shard results
        id: merge
        shell: bash
        run: |
          PASSED=0; FAILED=0; TOTAL=0; DURATION=0
          for dir in merged-results/shard-result-*/; do
            [ -f "$dir/playwright/report.json" ] || continue
            P=$(jq '[.suites[].specs[].tests[].results[] | select(.status=="passed")] | length' "$dir/playwright/report.json" 2>/dev/null || echo 0)
            F=$(jq '[.suites[].specs[].tests[].results[] | select(.status=="failed")] | length' "$dir/playwright/report.json" 2>/dev/null || echo 0)
            D=$(jq '.stats.duration // 0' "$dir/playwright/report.json" 2>/dev/null || echo 0)
            PASSED=$((PASSED + P)); FAILED=$((FAILED + F)); DURATION=$((DURATION + D))
          done
          TOTAL=$((PASSED + FAILED))
          PASS_RATE=0
          [ "$TOTAL" -gt 0 ] && PASS_RATE=$(( (PASSED * 100) / TOTAL ))
          echo "passed=$PASSED"       >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"       >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"         >> "$GITHUB_OUTPUT"
          echo "pass_rate=$PASS_RATE" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION"   >> "$GITHUB_OUTPUT"
          echo "📊 Merged: $PASSED/$TOTAL passing (${PASS_RATE}%)"

      - name: Generate run JSON
        id: run-json
        shell: bash
        run: |
          RUN_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_ID="${{ inputs.suite_id }}-$(date -u +%Y%m%dT%H%M%S)"
          cat > /tmp/new-run.json << EOF
          {
            "id": "$RUN_ID",
            "suite": "${{ inputs.suite_id }}",
            "env": "${{ inputs.tier }}",
            "envLabel": "${{ inputs.env_label }}",
            "tier": "${{ inputs.tier }}",
            "network": "${{ inputs.network }}",
            "started": "$RUN_TS",
            "duration": ${{ steps.merge.outputs.duration }},
            "passed": ${{ steps.merge.outputs.passed }},
            "failed": ${{ steps.merge.outputs.failed }},
            "total": ${{ steps.merge.outputs.total }},
            "passPct": ${{ steps.merge.outputs.pass_rate }},
            "failures": ${{ steps.merge.outputs.failed }},
            "runnerType": "playwright",
            "ghRunId": "${{ github.run_id }}"
          }
          EOF
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          # Merge into runs.json
          node -e "
            const fs = require('fs');
            const existing = JSON.parse(fs.readFileSync('${{ env.WORKING_DIR }}/data/runs.json','utf8'));
            const newRun = JSON.parse(fs.readFileSync('/tmp/new-run.json','utf8'));
            existing.unshift(newRun);
            fs.writeFileSync('${{ env.WORKING_DIR }}/data/runs.json', JSON.stringify(existing, null, 2));
          "

      - name: Run AWARE Operator (lifecycle + promotion gate)
        uses: ./.github/actions/aware-operator
        with:
          suite-id: ${{ inputs.suite_id }}
          env-label: ${{ inputs.env_label }}
          tier: ${{ inputs.tier }}
          network: ${{ inputs.network }}
          run-id: ${{ steps.run-json.outputs.run_id }}
          pass-rate: ${{ steps.merge.outputs.pass_rate }}
          failures: ${{ steps.merge.outputs.failed }}
          total-tests: ${{ steps.merge.outputs.total }}
          duration-ms: ${{ steps.merge.outputs.duration }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write runs.json to data branch
        uses: ./.github/actions/data-writer
        with:
          files: "${{ env.WORKING_DIR }}/data/runs.json"
          dest-paths: "runs.json"
          commit-message: "run: ${{ steps.run-json.outputs.run_id }} — ${{ inputs.suite_id }} @ ${{ inputs.env_label }} (${{ steps.merge.outputs.pass_rate }}%) [skip ci]"
          github-token: ${{ secrets.GITHUB_TOKEN }}
