# =============================================================================
# Setup Node — Reusable Bootstrap (Kubernetes: Init Container pattern)
#
# Every job that needs Node.js + pnpm uses this action instead of
# copy-pasting the same 3 steps. Like a K8s init container: runs before
# the main container and prepares the environment.
#
# Called by: job-playwright.yml, job-pytest.yml, deploy-site.yml, validate.yml
# =============================================================================
name: "Setup Node"
description: "Reusable Node.js + pnpm bootstrap (init container pattern)"

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"
  pnpm-version:
    description: "pnpm version"
    required: false
    default: "10"
  working-dir:
    description: "Directory to run pnpm install in"
    required: false
    default: "."
  install-flags:
    description: "Extra flags for pnpm install"
    required: false
    default: "--frozen-lockfile"

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"
        cache-dependency-path: "${{ inputs.working-dir }}/pnpm-lock.yaml"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-dir }}
      run: pnpm install ${{ inputs.install-flags }}
