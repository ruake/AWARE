version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/artifacts/aware-app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      production-deps:
        patterns:
          - "*"
        dependency-type: "production"
      development-deps:
        patterns:
          - "*"
        dependency-type: "development"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
