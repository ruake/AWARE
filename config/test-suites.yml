# =============================================================================
# A.W.A.R.E. — Test Suite Configuration
# All suites target https://www.akamai.com/
#
# Each suite specifies which environment+network combinations it runs on.
# Staging network = Akamai staging edge (pre-activation validation).
# Production network = live Akamai edge PoPs.
#
# Commit changes here; GitHub Actions reads this file directly.
# =============================================================================

suites:
  - id: suite_continuous
    name: Continuous — QA / Staging (Every 30min)
    description: >
      Lightweight smoke suite running every 30 minutes on QA / Staging
      to catch regressions fast. Single environment, low parallelism.
    environments:
      - "QA / Staging"
    parallelism: 2
    retries: 0
    failFast: true
    timeoutMinutes: 5
    runners: [playwright, pytest]
    tags: [smoke, continuous]
    schedule: "*/30 * * * *"

  - id: suite_smoke
    name: Smoke — All Environments
    description: >
      Lightweight smoke tests run on every deployment across all six
      environment+network combinations. Must complete in < 3 minutes.
    environments:
      - "QA / Staging"
      - "QA / Production"
      - "UAT / Staging"
      - "UAT / Production"
      - "PROD / Staging"
      - "PROD / Production"
    parallelism: 4
    retries: 1
    failFast: true
    timeoutMinutes: 5
    runners: [playwright, pytest]
    tags: [smoke, geo-match, routing, tls]
    schedule: null  # triggered on every deployment

  - id: suite_regression_qa
    name: Full Regression — QA (Staging + Production)
    description: >
      Complete Playwright + pytest regression on both QA networks.
      Runs on every feature branch push that touches Akamai property
      config or EdgeWorker code.
    environments:
      - "QA / Staging"
      - "QA / Production"
    parallelism: 8
    retries: 2
    failFast: false
    timeoutMinutes: 30
    runners: [playwright, pytest]
    tags: [regression, geo-match, caching, edgeworker, waf, bot-manager]
    schedule: "0 */2 * * *"  # every 2 hours

  - id: suite_regression_uat
    name: Full Regression — UAT (Staging + Production)
    description: >
      Complete regression suite in UAT before property promotion to PROD.
      Promotion gate: ≥ 95% pass rate on both networks required.
    environments:
      - "UAT / Staging"
      - "UAT / Production"
    parallelism: 6
    retries: 2
    failFast: false
    timeoutMinutes: 30
    runners: [playwright, pytest]
    tags: [regression, performance, security, caching]
    schedule: "0 6 * * *"  # 06:00 UTC nightly

  - id: suite_nightly_prod
    name: Nightly Regression — PROD (Staging + Production)
    description: >
      Full regression run against both PROD networks overnight.
      Any failure on PROD / Production raises a PagerDuty alert.
    environments:
      - "PROD / Staging"
      - "PROD / Production"
    parallelism: 4
    retries: 1
    failFast: false
    timeoutMinutes: 45
    runners: [playwright, pytest]
    tags: [regression, smoke, performance, security]
    schedule: "0 2 * * *"  # 02:00 UTC nightly

  - id: suite_edgeworker
    name: EdgeWorker Unit Tests
    description: >
      Pytest-based unit tests for EdgeWorker bundles.
      Run on QA + UAT staging networks only (before activation).
    environments:
      - "QA / Staging"
      - "UAT / Staging"
    parallelism: 4
    retries: 0
    failFast: true
    timeoutMinutes: 10
    runners: [pytest]
    tags: [edgeworker, functional]
    schedule: null  # triggered on EW deploy

  - id: suite_performance
    name: Performance Benchmarks
    description: >
      Playwright tests measuring TTFB, cache hit ratio, and Ion compression
      savings. Runs on production network only (real traffic characteristics).
    environments:
      - "QA / Production"
      - "UAT / Production"
      - "PROD / Production"
    parallelism: 2
    retries: 1
    failFast: false
    timeoutMinutes: 20
    runners: [playwright]
    tags: [performance, caching, ion]
    schedule: "0 4 * * 1"  # Monday 04:00 UTC
