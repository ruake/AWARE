project:
  name: A.W.A.R.E.
  fullName: Akamai Web Analytics Regression Engine
  description: >
    CDN test observability dashboard running HTTP protocol tests
    against httpbin.org across QA, UAT, and PROD environments.
  team: platform-engineering
  repoUrl: https://github.com/ruake/AWARE
  slackChannel: "#cdn-alerts"

properties:
  - name: httpbin.org
    contractId: ctr_00000000
    groupId: grp_00000000
    cpcode: "0000000"
    edgeHostname: httpbin.org
    activeVersions:
      qa: 1
      uat: 1
      prod: 1
    promotionGate:
      minPassRate: 95
      requiredSuites:
        - suite_smoke
        - suite_regression_uat

edgeworkers: []

runners:
  playwright:
    version: "^1.60.0"
    browser: chromium
    headless: true
    baseTimeout: 30000
    retries: 2
    workers: 4
    baseUrl: https://httpbin.org
    reportDir: reports/playwright/

  pytest:
    version: "^8.0"
    markers:
      - smoke
      - regression
      - performance
      - security
    timeout: 60
    workers: 4
    baseUrl: https://httpbin.org
    reportDir: reports/pytest/

notifications:
  slack:
    enabled: true
    channel: "#cdn-alerts"
    notifyOn: [fail, regression]
  githubChecks:
    enabled: true
    requiredForMerge: true
  pagerduty:
    enabled: true
    triggerOn: [prod_prod_fail, pass_rate_below_80]
